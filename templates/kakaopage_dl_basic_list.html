{% extends "base.html" %}
{% block content %}

<div>
  {{ macros.m_button_group([['globalListRefreshBtn', '새로고침'],
                            ['globalDbDeleteBtn', '이력 삭제']]) }}
  {{ macros.m_row_start('5') }}
  {{ macros.m_row_end() }}

  <table class="table table-sm table-striped tx-13">
    <thead>
      <tr>
        <th>#</th>
        <th>작품</th>
        <th>회차</th>
        <th>장수</th>
        <th>용량</th>
        <th>상태</th>
        <th>대여만료</th>
        <th>받은시각</th>
        <th>경로</th>
      </tr>
    </thead>
    <tbody id="list_tbody">
    </tbody>
  </table>
  {{ macros.m_pagination() }}
</div>

<script type="text/javascript">
var package_name = "{{ arg['package_name'] }}";
var current_data = null;

$(document).ready(function(){
  global_list_request();
});

function global_make_list_row(item, idx){
  function fmtBytes(n){
    if(!n) return '-';
    if(n < 1024) return n + 'B';
    if(n < 1024*1024) return (n/1024).toFixed(1) + 'KB';
    return (n/1024/1024).toFixed(1) + 'MB';
  }
  function statusBadge(s){
    var cls = 'secondary';
    if(s === 'completed') cls = 'success';
    else if(s === 'partial') cls = 'warning';
    else if(s === 'failed') cls = 'danger';
    else if(s === 'downloading' || s === 'using_ticket') cls = 'info';
    return '<span class="badge badge-' + cls + '">' + (s || '-') + '</span>';
  }
  return '<tr>'
    + '<td>' + item.id + '</td>'
    + '<td>' + (item.series_title || '-') + '</td>'
    + '<td>' + (item.episode_title || '-') + '</td>'
    + '<td>' + (item.downloaded_count || 0) + '/' + (item.page_count || '?') + '</td>'
    + '<td>' + fmtBytes(item.total_bytes) + '</td>'
    + '<td>' + statusBadge(item.status) + '</td>'
    + '<td>' + (item.rent_expire_dt || '-') + '</td>'
    + '<td>' + (item.downloaded_at || '-') + '</td>'
    + '<td><small>' + (item.save_dir || '') + '</small></td>'
    + '</tr>';
}
</script>
{% endblock %}
